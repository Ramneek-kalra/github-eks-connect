name: Cleanup AWS Resources

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'ECS Cluster Name'
        required: true
        default: 'github-test-cluster'
      service_name:
        description: 'ECS Service Name'
        required: true
        default: 'github-test-service'
      task_definition_family:
        description: 'Task Definition Family'
        required: true
        default: 'nginx-fargate-task'

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-west-2  # Change to your region

    - name: Scale down ECS service
      run: |
        aws ecs update-service --cluster ${{ github.event.inputs.cluster_name }} --service ${{ github.event.inputs.service_name }} --desired-count 0

    - name: Delete ECS service
      run: |
        aws ecs delete-service --cluster ${{ github.event.inputs.cluster_name }} --service ${{ github.event.inputs.service_name }} --force

    - name: Deregister task definition
      run: |
        # Get all revisions of the task definition
        TASK_DEFS=$(aws ecs list-task-definitions --family-prefix ${{ github.event.inputs.task_definition_family }} --query 'taskDefinitionArns[]' --output text)
        for TASK_DEF in $TASK_DEFS; do
          aws ecs deregister-task-definition --task-definition $TASK_DEF
        done

    - name: Delete CloudWatch log group (optional)
      run: |
        aws logs delete-log-group --log-group-name /ecs/nginx
      continue-on-error: true
